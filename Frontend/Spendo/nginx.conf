server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Line for react router dom can work
        try_files $uri $uri/ /index.html;
    }

    # Optional: show errors
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}